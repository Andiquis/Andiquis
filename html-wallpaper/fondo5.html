<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Wallpaper Pro</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #000000;
        position: relative;
      }

      .gradient-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.12) 0%, transparent 50%),
          radial-gradient(circle at 50% 50%, rgba(255, 0, 150, 0.1) 0%, transparent 50%),
          linear-gradient(135deg, #0a0a0a 0%, #1a0a1f 50%, #0a1a1a 100%);
      }

      .hex-grid {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='104' viewBox='0 0 60 104' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l26 15v30l-26 15-26-15V15z' fill='none' stroke='%2300ffff' stroke-width='0.3' opacity='0.15'/%3E%3C/svg%3E");
        opacity: 0.3;
      }

      .terminal-window {
        position: absolute;
        top: 15%;
        left: 8%;
        width: 420px;
        background: rgba(15, 15, 25, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        border: 1px solid rgba(0, 255, 255, 0.2);
        box-shadow: 0 8px 32px rgba(0, 255, 255, 0.1);
        overflow: hidden;
      }

      .terminal-header {
        background: rgba(20, 20, 30, 0.8);
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid rgba(0, 255, 255, 0.15);
      }

      .terminal-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .dot-red {
        background: #ff5f56;
      }
      .dot-yellow {
        background: #ffbd2e;
      }
      .dot-green {
        background: #27c93f;
      }

      .terminal-body {
        padding: 20px;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        color: #00ff88;
        line-height: 1.8;
      }

      .terminal-prompt {
        color: #00d4ff;
      }

      .terminal-cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        background: #00ff88;
        margin-left: 2px;
      }

      .code-card {
        position: absolute;
        bottom: 15%;
        right: 10%;
        width: 380px;
        background: rgba(15, 15, 25, 0.7);
        backdrop-filter: blur(10px);
        border-radius: 12px;
        border: 1px solid rgba(255, 0, 150, 0.3);
        box-shadow: 0 8px 32px rgba(255, 0, 150, 0.15);
        padding: 24px;
      }

      .code-card pre {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        color: #ff0096;
        line-height: 1.8;
        margin: 0;
      }

      .code-keyword {
        color: #00d4ff;
      }
      .code-function {
        color: #ffa500;
      }
      .code-string {
        color: #00ff88;
      }

      .floating-element {
        position: absolute;
        background: rgba(255, 255, 255, 0.03);
        border: 2px solid;
        backdrop-filter: blur(5px);
      }

      .element-1 {
        top: 35%;
        right: 25%;
        width: 140px;
        height: 140px;
        border-color: rgba(138, 43, 226, 0.4);
        border-radius: 20px;
        transform: rotate(15deg);
      }

      .element-2 {
        bottom: 35%;
        left: 15%;
        width: 100px;
        height: 100px;
        border-color: rgba(0, 255, 255, 0.4);
        border-radius: 50%;
      }

      .element-3 {
        top: 25%;
        left: 45%;
        width: 80px;
        height: 80px;
        border-color: rgba(255, 0, 150, 0.4);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      }

      .glow-orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        opacity: 0.15;
      }

      .orb-1 {
        top: 10%;
        right: 20%;
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, #8a2be2, transparent);
      }

      .orb-2 {
        bottom: 15%;
        left: 25%;
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, #00ffff, transparent);
      }

      .orb-3 {
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #ff0096, transparent);
      }

      .center-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
        z-index: 1;
      }

      .main-title {
        font-family: 'Courier New', monospace;
        font-size: 72px;
        font-weight: bold;
        background: linear-gradient(135deg, #00ffff, #ff0096, #8a2be2);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        opacity: 0.2;
        letter-spacing: -2px;
      }

      .grid-dots {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: radial-gradient(circle, rgba(0, 255, 255, 0.15) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.2;
      }

      .accent-line {
        position: absolute;
        background: linear-gradient(90deg, transparent, currentColor, transparent);
        opacity: 0.15;
        height: 1px;
      }

      .line-1 {
        top: 20%;
        left: 0;
        width: 100%;
        color: #00ffff;
      }

      .line-2 {
        top: 60%;
        left: 0;
        width: 100%;
        color: #ff0096;
      }

      .line-3 {
        top: 80%;
        left: 0;
        width: 100%;
        color: #8a2be2;
      }

      .corner-frame {
        position: absolute;
        width: 100px;
        height: 100px;
        border: 2px solid;
        opacity: 0.2;
      }

      .frame-tl {
        top: 30px;
        left: 30px;
        border-right: none;
        border-bottom: none;
        border-color: #00ffff;
      }

      .frame-tr {
        top: 30px;
        right: 30px;
        border-left: none;
        border-bottom: none;
        border-color: #ff0096;
      }

      .frame-bl {
        bottom: 30px;
        left: 30px;
        border-right: none;
        border-top: none;
        border-color: #8a2be2;
      }

      .frame-br {
        bottom: 30px;
        right: 30px;
        border-left: none;
        border-top: none;
        border-color: #00ffff;
      }
    </style>
  </head>
  <body>
    <div class="gradient-bg"></div>
    <div class="hex-grid"></div>
    <div class="grid-dots"></div>

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <div class="accent-line line-1"></div>
    <div class="accent-line line-2"></div>
    <div class="accent-line line-3"></div>

    <div class="terminal-window">
      <div class="terminal-header">
        <div class="terminal-dot dot-red"></div>
        <div class="terminal-dot dot-yellow"></div>
        <div class="terminal-dot dot-green"></div>
      </div>
      <div class="terminal-body">
        <span class="terminal-prompt">user@dev:~$</span> npm run build<br />
        > Building project...<br />
        > Compiling modules...<br />
        > ✓ Build successful<br />
        > Ready in 2.4s<br />
        <span class="terminal-prompt">user@dev:~$</span><span class="terminal-cursor"></span>
      </div>
    </div>

    <div class="code-card">
      <pre><span class="code-keyword">const</span> <span class="code-function">createArt</span> = () => {
  <span class="code-keyword">return</span> {
    design: <span class="code-string">'minimal'</span>,
    impact: <span class="code-string">'maximum'</span>,
    vibes: <span class="code-string">'immaculate'</span>
  };
};</pre>
    </div>

    <div class="floating-element element-1"></div>
    <div class="floating-element element-2"></div>
    <div class="floating-element element-3"></div>

    <div class="center-text">
      <div class="main-title">&lt;CODE/&gt;</div>
    </div>

    <div class="corner-frame frame-tl"></div>
    <div class="corner-frame frame-tr"></div>
    <div class="corner-frame frame-bl"></div>
    <div class="corner-frame frame-br"></div>
  </body>
</html>
