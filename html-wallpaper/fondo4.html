<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Wallpaper</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: linear-gradient(135deg, #0a0e27 0%, #1a1a2e 50%, #16213e 100%);
        position: relative;
      }

      .grid-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
      }

      .code-snippet {
        position: absolute;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        opacity: 0.15;
        color: #00ff88;
        white-space: pre;
        line-height: 1.6;
      }

      .snippet-1 {
        top: 10%;
        left: 5%;
      }

      .snippet-2 {
        top: 60%;
        right: 8%;
        color: #00d4ff;
      }

      .snippet-3 {
        bottom: 15%;
        left: 10%;
        color: #ff00ff;
      }

      .geometric-shape {
        position: absolute;
        border: 2px solid;
        opacity: 0.1;
      }

      .hex-1 {
        top: 20%;
        right: 15%;
        width: 120px;
        height: 120px;
        border-color: #00ff88;
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      }

      .circle-1 {
        bottom: 25%;
        left: 20%;
        width: 180px;
        height: 180px;
        border-color: #00d4ff;
        border-radius: 50%;
      }

      .square-1 {
        top: 45%;
        left: 45%;
        width: 100px;
        height: 100px;
        border-color: #ff00ff;
        transform: rotate(45deg);
      }

      .circuit-line {
        position: absolute;
        background: linear-gradient(90deg, transparent, #00ff88, transparent);
        opacity: 0.08;
      }

      .line-h-1 {
        top: 30%;
        left: 0;
        width: 40%;
        height: 2px;
      }

      .line-v-1 {
        top: 0;
        right: 30%;
        width: 2px;
        height: 50%;
        background: linear-gradient(180deg, transparent, #00d4ff, transparent);
      }

      .line-h-2 {
        bottom: 20%;
        right: 0;
        width: 35%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #ff00ff, transparent);
      }

      .center-logo {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }

      .logo-bracket {
        font-family: 'Courier New', monospace;
        font-size: 120px;
        color: #00ff88;
        opacity: 0.3;
        font-weight: bold;
        text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
      }

      .corner-accent {
        position: absolute;
        width: 80px;
        height: 80px;
        border: 3px solid;
        opacity: 0.2;
      }

      .accent-tl {
        top: 20px;
        left: 20px;
        border-right: none;
        border-bottom: none;
        border-color: #00ff88;
      }

      .accent-br {
        bottom: 20px;
        right: 20px;
        border-left: none;
        border-top: none;
        border-color: #00d4ff;
      }

      .binary-text {
        position: absolute;
        font-family: 'Courier New', monospace;
        font-size: 12px;
        color: #00ff88;
        opacity: 0.08;
        letter-spacing: 2px;
      }

      .binary-1 {
        top: 15%;
        right: 25%;
        transform: rotate(-5deg);
      }

      .binary-2 {
        bottom: 30%;
        right: 10%;
        transform: rotate(5deg);
      }
    </style>
  </head>
  <body>
    <div class="grid-overlay"></div>

    <div class="code-snippet snippet-1">
      const code = { clean: true, efficient: true, elegant: true };
    </div>

    <div class="code-snippet snippet-2">
      function develop() { while(true) { create(); test(); deploy(); } }
    </div>

    <div class="code-snippet snippet-3">if (coffee == true) { productivity = 100; bugs = 0; }</div>

    <div class="geometric-shape hex-1"></div>
    <div class="geometric-shape circle-1"></div>
    <div class="geometric-shape square-1"></div>

    <div class="circuit-line line-h-1"></div>
    <div class="circuit-line line-v-1"></div>
    <div class="circuit-line line-h-2"></div>

    <div class="center-logo">
      <div class="logo-bracket">{ }</div>
    </div>

    <div class="corner-accent accent-tl"></div>
    <div class="corner-accent accent-br"></div>

    <div class="binary-text binary-1">01001000 01100101 01101100 01101100 01101111</div>
    <div class="binary-text binary-2">01010111 01101111 01110010 01101100 01100100</div>
  </body>
</html>
