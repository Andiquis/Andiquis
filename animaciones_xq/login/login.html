<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Título de tu página</title>
    <link rel="stylesheet" href="estilos.css"> <!-- Suponiendo que tu archivo CSS se llama estilos.css y está en el mismo directorio -->
</head>
<body>

<section>

    <form>

        <h1>Inicio</h1>

        <div class="input-box">
            <ion-icon name="mail-outline"></ion-icon>
            <input type="email" placeholder=".           .@gmail.com" required>
            <label for="">Usuario</label>
        </div>

        <div class="input-box">
            <ion-icon name="lock-closed-outline"></ion-icon>
            <input type="password" required>
            <label for="">Contraseña</label>
        </div>

        <div class="forget">
            <label for=""><input type="checkbox"> Recordar</label>
            <a href="#">Olvidé la Contraseña</a>
        </div>

        <button>Iniciar</button>

        <div class="registration">
            <p>No tengo una cuenta <a href="#">Regístrate</a></p>
        </div>

    </form>

</section>

</body>
</html>
