<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Hexágono Hacker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #001a00, #000000);
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Fondo con efecto de grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 0, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 0, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
        }

        /* Efectos de fondo animados */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .scanning-line {
            position: absolute;
            width: 2px;
            height: 100vh;
            background: linear-gradient(180deg, transparent, #00ff00, transparent);
            left: 20%;
            animation: scan-vertical 8s linear infinite;
            opacity: 0.4;
        }

        .scanning-line:nth-child(2) {
            left: 80%;
            animation-delay: 4s;
        }

        .data-particles {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ff00;
            border-radius: 50%;
            animation: float-particle 6s ease-in-out infinite;
        }

        .particle-1 { top: 20%; left: 10%; animation-delay: 0s; }
        .particle-2 { top: 60%; left: 90%; animation-delay: 2s; }
        .particle-3 { top: 80%; left: 30%; animation-delay: 4s; }

        .hexagon-container {
            width: 180px;
            height: 207.8px;
            position: relative;
            filter: drop-shadow(0 0 30px rgba(0, 255, 0, 0.6));
        }

        .hexagon {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00ff00, #00cc00, #008800);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 
                0 0 25px #00ff00, 
                0 0 50px rgba(0, 255, 0, 0.8),
                0 0 100px rgba(0, 255, 0, 0.4),
                inset 0 0 20px rgba(0, 0, 0, 0.3);
            z-index: 10;
            transition: all 0.5s ease-in-out;
            border: 2px solid #00ff41;
            cursor: pointer;
        }

        .hexagon:hover {
            box-shadow: 
                0 0 40px #00ff00, 
                0 0 80px rgba(0, 255, 0, 0.9),
                0 0 120px rgba(0, 255, 0, 0.6),
                inset 0 0 30px rgba(0, 0, 0, 0.2);
            transform: scale(1.05) rotate(2deg);
            background: linear-gradient(135deg, #00ff41, #00ff00, #00cc00);
        }

        .hexagon-inner {
            color: #00ff00;
            font-family: 'Courier New', monospace;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 
                0 0 5px rgba(0, 0, 0, 0.8),
                0 0 10px rgb(255, 255, 255);
            z-index: 20;
            position: relative;
            user-select: none;
        }

        /* Efecto de brillo interior */
        .hexagon::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            right: 3px;
            bottom: 3px;
            background: linear-gradient(45deg, rgba(0, 255, 0, 0.3), transparent, rgba(0, 255, 0, 0.3));
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 15;
            animation: inner-glow 3s ease-in-out infinite alternate;
        }

        /* Fondo negro interior */
        .hexagon::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            background: radial-gradient(circle, #0a0a0a, #000);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            z-index: 5;
        }

        /* Bordes de targeting */
        .targeting-frame {
            position: absolute;
            width: 220px;
            height: 220px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }

        .corner.top-left {
            top: 0;
            left: 0;
            border-right: none;
            border-bottom: none;
            animation: corner-pulse 2s ease-in-out infinite;
        }

        .corner.top-right {
            top: 0;
            right: 0;
            border-left: none;
            border-bottom: none;
            animation: corner-pulse 2s ease-in-out infinite 0.5s;
        }

        .corner.bottom-left {
            bottom: 0;
            left: 0;
            border-right: none;
            border-top: none;
            animation: corner-pulse 2s ease-in-out infinite 1s;
        }

        .corner.bottom-right {
            bottom: 0;
            right: 0;
            border-left: none;
            border-top: none;
            animation: corner-pulse 2s ease-in-out infinite 1.5s;
        }

        /* Líneas de conexión */
        .connection-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .line {
            position: absolute;
            background: linear-gradient(90deg, transparent, #00ff00, transparent);
            opacity: 0.6;
        }

        .line.horizontal {
            width: 60px;
            height: 1px;
            top: 50%;
            left: -80px;
            animation: line-flash 4s ease-in-out infinite;
        }

        .line.horizontal.right {
            left: auto;
            right: -80px;
            animation-delay: 2s;
        }

        .line.vertical {
            width: 1px;
            height: 60px;
            left: 50%;
            top: -80px;
            background: linear-gradient(180deg, transparent, #00ff00, transparent);
            animation-delay: 1s;
        }

        .line.vertical.bottom {
            top: auto;
            bottom: -80px;
            animation-delay: 3s;
        }

        /* Texto de estado */
        .status-text {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: #00ff00;
            text-shadow: 0 0 5px #00ff00;
            letter-spacing: 2px;
            animation: text-flicker 3s ease-in-out infinite;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 5px #00ff00;
            animation: status-blink 2s ease-in-out infinite;
        }

        /* Código de acceso flotante */
        .access-code {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Fira Code', monospace;
            font-size: 10px;
            color: #00ff00;
            opacity: 0.7;
            letter-spacing: 1px;
            animation: code-scroll 6s linear infinite;
        }

        /* Animaciones */
        @keyframes inner-glow {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }

        @keyframes corner-pulse {
            0%, 100% { 
                box-shadow: 0 0 5px #00ff00;
                border-color: #00ff00;
            }
            50% { 
                box-shadow: 0 0 15px #00ff00, 0 0 25px #00ff00;
                border-color: #00ff41;
            }
        }

        @keyframes line-flash {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        @keyframes text-flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        @keyframes status-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes code-scroll {
            0% { content: 'ACCESS_GRANTED'; }
            25% { content: '0xDEADBEEF'; }
            50% { content: 'SYSTEM_OK'; }
            75% { content: 'EXPLOIT_READY'; }
            100% { content: 'ACCESS_GRANTED'; }
        }

        @keyframes scan-vertical {
            0% { transform: translateX(-100px); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateX(100px); opacity: 0; }
        }

        @keyframes float-particle {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }

        /* Efecto de click */
        .hexagon:active {
            transform: scale(0.95);
            box-shadow: 
                0 0 20px #00ff00, 
                0 0 40px rgba(0, 255, 0, 0.6),
                inset 0 0 40px rgba(0, 0, 0, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hexagon-container {
                width: 150px;
                height: 173.2px;
            }
            
            .hexagon-inner {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-effects">
        <div class="scanning-line"></div>
        <div class="scanning-line"></div>
        <div class="data-particles particle-1"></div>
        <div class="data-particles particle-2"></div>
        <div class="data-particles particle-3"></div>
    </div>

    <div class="targeting-frame">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>
        
        <div class="connection-lines">
            <div class="line horizontal"></div>
            <div class="line horizontal right"></div>
            <div class="line vertical"></div>
            <div class="line vertical bottom"></div>
        </div>
    </div>

    <div class="hexagon-container">
        <div class="access-code">ACCESS_GRANTED</div>
        <div class="hexagon">
            <span class="hexagon-inner">&lt;x_Q&gt;</span>
        </div>
        <div class="status-text">
            <span class="status-indicator"></span>ONLINE
        </div>
    </div>
</body>
</html>
