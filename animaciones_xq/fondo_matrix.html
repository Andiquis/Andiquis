<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixed Matrix Hacker Background</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0a;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    .matrix-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: #0a0a0a;
      overflow: hidden;
    }

    .matrix-bg::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(transparent, rgba(0, 255, 0, 0.15));
      animation: rain 8s linear infinite;
    }

    .matrix-bg::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 0, 0.1), transparent);
      animation: scanline 6s linear infinite;
    }

    .matrix-code {
      position: absolute;
      color: rgba(0, 255, 0, 0.8);
      font-size: 16px;
      text-shadow: 0 0 10px rgba(0, 255, 0, 0.9);
      animation: fall linear infinite;
      white-space: nowrap;
      pointer-events: none;
    }

    .text {
      position: relative;
      color: #00ff00;
      font-family: 'Courier New', Courier, monospace;
      font-size: 48px;
      font-weight: bold;
      text-shadow: 0 0 15px rgba(0, 255, 0, 1), 0 0 30px rgba(0, 255, 0, 0.7);
      letter-spacing: 4px;
      animation: flicker 1.2s infinite, pulseText 3s ease-in-out infinite;
      z-index: 1;
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 255, 0, 0.3) 0%, transparent 70%);
      z-index: -1;
      animation: glowFade 3s ease-in-out infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh);
        opacity: 0.8;
      }
      20% {
        opacity: 1;
      }
      80% {
        opacity: 0.5;
      }
      100% {
        transform: translateY(110vh);
        opacity: 0;
      }
    }

    @keyframes rain {
      0% { background-position: 0 0; }
      100% { background-position: 0 1200px; }
    }

    @keyframes scanline {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
      75% { opacity: 0.8; }
    }

    @keyframes pulseText {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    @keyframes glowFade {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="matrix-bg"></div>
  <div class="text"><x_Q></div>
  <div class="glow"></div>
  <script>
    function createMatrixCode() {
      const matrixBg = document.querySelector('.matrix-bg');
      for (let i = 0; i < 120; i++) {
        const code = document.createElement('div');
        code.className = 'matrix-code';
        code.textContent = Math.random().toString(36).substring(2, 8 + Math.floor(Math.random() * 12));
        code.style.left = Math.random() * 100 + 'vw';
        code.style.fontSize = 12 + Math.random() * 12 + 'px';
        code.style.animationDuration = 3 + Math.random() * 7 + 's';
        code.style.animationDelay = Math.random() * 3 + 's';
        code.style.opacity = 0.5 + Math.random() * 0.5;
        matrixBg.appendChild(code);
      }
    }
    createMatrixCode();
  </script>
</body>
</html>
