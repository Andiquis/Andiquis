<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix "Te Amo" Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: relative;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .toggle-settings {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #00ff00;
            transition: all 0.3s ease;
        }

        .toggle-settings:hover {
            background: rgba(0, 255, 0, 0.1);
            transform: scale(1.1);
        }

        .controls {
            position: fixed;
            top: 20px;
            right: 80px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border: 2px solid #00ff00;
            border-radius: 12px;
            color: #00ff00;
            font-size: 12px;
            max-width: 350px;
            max-height: 80vh;
            overflow-y: auto;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .controls.show {
            transform: translateX(0);
            opacity: 1;
        }

        .controls h3 {
            margin-bottom: 15px;
            color: #00ff41;
            text-align: center;
            font-size: 14px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #00ff41;
            font-weight: bold;
        }

        input[type="text"], input[type="range"], select, textarea {
            width: 100%;
            padding: 8px;
            background: #001100;
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        input[type="range"] {
            padding: 0;
            height: 20px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #001100;
            border: 2px solid #00ff00;
            color: #00ff00;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #002200;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .value-display {
            color: #00ff41;
            font-size: 11px;
            text-align: center;
            font-weight: bold;
        }

        .word-list {
            max-height: 100px;
            overflow-y: auto;
            background: #001100;
            border: 1px solid #00ff00;
            padding: 8px;
            border-radius: 4px;
            font-size: 10px;
            line-height: 1.4;
        }

        .phrase-list {
            max-height: 120px;
            overflow-y: auto;
            background: #001100;
            border: 1px solid #00ff00;
            padding: 8px;
            border-radius: 4px;
            font-size: 10px;
        }

        .phrase-item {
            padding: 2px 4px;
            margin: 2px 0;
            background: rgba(0, 255, 0, 0.1);
            border-radius: 3px;
            border-left: 3px solid #00ff41;
        }

        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            font-size: 2.5em;
            color: #00ff41;
            text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41;
            opacity: 0;
            transition: all 1s ease;
            text-align: center;
            font-weight: bold;
        }

        .message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
        }

        .mode-selector {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        .mode-btn {
            flex: 1;
            padding: 5px;
            font-size: 10px;
            margin: 0;
        }

        .mode-btn.active {
            background: #00ff00;
            color: #000;
        }

        .next-phrase {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 15;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #00ff00;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #00ff00;
            transition: all 0.3s ease;
        }

        .next-phrase:hover {
            background: rgba(0, 255, 0, 0.1);
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .controls {
                right: 10px;
                top: 80px;
                max-width: calc(100vw - 20px);
                font-size: 11px;
            }
            
            .toggle-settings {
                right: 10px;
                top: 10px;
            }
            
            .message {
                font-size: 1.8em;
                padding: 0 20px;
            }
            
            .next-phrase {
                bottom: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="matrix-canvas"></canvas>
    
    <div class="message" id="message"></div>
    
    <div class="toggle-settings" id="toggle-settings" onclick="toggleSettings()">
        +
    </div>
    
    <div class="controls" id="controls">
        <h3>🔰 CONFIGURACIÓN MATRIX</h3>
        
        <div class="control-group">
            <label>Modo de Matriz:</label>
            <div class="mode-selector">
                <button class="mode-btn active" onclick="setMatrixMode('characters')">Caracteres</button>
                <button class="mode-btn" onclick="setMatrixMode('words')">Palabras</button>
            </div>
        </div>

        <div class="control-group">
            <label for="custom-words">Palabras/Caracteres Personalizados:</label>
            <textarea id="custom-words" placeholder="te amo, amor, corazón, mi vida">teAmo, helloWorld</textarea>
            <button onclick="updateWords()">🔄 Actualizar Palabras</button>
        </div>

        <div class="control-group">
            <label for="custom-phrases">Frases Románticas (una por línea):</label>
            <textarea id="custom-phrases" placeholder="matrix">
.
Te amo más que a nada en el mundo
Eres mi razón de ser
Cada día te amo más
Nuestro amor es eterno
Eres mi todo
Siempre juntos, siempre amándonos
Te amo con todo mi corazón
Eres mi sol en los días nublados
Mi corazón late solo para ti
Contigo el mundo es perfecto</textarea>
            <button onclick="updatePhrases()">Actualizar Frases</button>
        </div>

        <div class="control-group">
            <label for="speed">Velocidad:</label>
            <input type="range" id="speed" min="1" max="20" value="8" oninput="updateSpeed(this.value)">
            <div class="value-display" id="speed-value">8</div>
        </div>

        <div class="control-group">
            <label for="density">Densidad:</label>
            <input type="range" id="density" min="10" max="100" value="40" oninput="updateDensity(this.value)">
            <div class="value-display" id="density-value">40</div>
        </div>

        <div class="control-group">
            <label for="font-size">Tamaño de Fuente:</label>
            <input type="range" id="font-size" min="10" max="30" value="16" oninput="updateFontSize(this.value)">
            <div class="value-display" id="font-size-value">16px</div>
        </div>

        <div class="control-group">
            <label for="color-scheme">Esquema de Color:</label>
            <select id="color-scheme" onchange="updateColorScheme(this.value)">
                <option value="green">💚 Verde Clásico</option>
                <option value="blue">💙 Azul Neón</option>
                <option value="red">❤️ Rojo Amor</option>
                <option value="purple">💜 Púrpura</option>
                <option value="gold">💛 Dorado</option>
                <option value="pink">💗 Rosa</option>
            </select>
        </div>

        <button onclick="showSortedPhrases()">Mostrar Frases Ordenadas</button>
        <button onclick="togglePause()">⏯️ Pausar/Reanudar</button>
        <button onclick="resetMatrix()">🔄 Reiniciar</button>

        <div class="control-group">
            <label>Palabras/Caracteres Activos:</label>
            <div class="word-list" id="active-words"></div>
        </div>

        <div class="control-group">
            <label>Frases Activas:</label>
            <div class="phrase-list" id="active-phrases"></div>
        </div>
    </div>

    <div class="next-phrase" id="next-phrase" onclick="showNextPhrase()">
        >
    </div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Variables de configuración
        let config = {
            speed: 8,
            density: 40,
            fontSize: 16,
            colorScheme: 'green',
            matrixMode: 'characters',
            customWords: ['teAmo', 'helloWorld'],
            customPhrases: [
                '',
                'Te amo más que a nada en el mundo',
                'Eres mi razón de ser',
                'Cada día te amo más',
                'Nuestro amor es eterno',
                'Eres mi todo',
                'Siempre juntos, siempre amándonos',
                'Te amo con todo mi corazón',
                'Eres mi sol en los días nublados',
                'Mi corazón late solo para ti',
                'Contigo el mundo es perfecto'
            ]
        };

        let columns, drops, isPaused = false;
        let animationId;
        let settingsVisible = false;
        let currentPhraseIndex = 0;
        let phraseTimeout;

        // Esquemas de color
        const colorSchemes = {
            green: { primary: '#00ff00', bright: '#00ff41' },
            blue: { primary: '#0080ff', bright: '#40a0ff' },
            red: { primary: '#ff0040', bright: '#ff4080' },
            purple: { primary: '#8040ff', bright: '#a060ff' },
            gold: { primary: '#ffd700', bright: '#ffed4e' },
            pink: { primary: '#ff69b4', bright: '#ffb6c1' }
        };

        function toggleSettings() {
            const controls = document.getElementById('controls');
            const toggleBtn = document.getElementById('toggle-settings');
            
            settingsVisible = !settingsVisible;
            
            if (settingsVisible) {
                controls.classList.add('show');
                toggleBtn.textContent = 'x';
            } else {
                controls.classList.remove('show');
                toggleBtn.textContent = '+';

            }
        }

        function setMatrixMode(mode) {
            config.matrixMode = mode;
            
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            updateWords();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            const charWidth = config.matrixMode === 'words' ? config.fontSize * 3 : config.fontSize;
            columns = Math.floor(canvas.width / charWidth);
            drops = [];
            
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.floor(Math.random() * canvas.height / config.fontSize);
            }
        }

        function drawMatrix() {
            if (isPaused) return;

            const colors = colorSchemes[config.colorScheme];
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = colors.primary;
            ctx.font = `${config.fontSize}px Courier New`;

            const charWidth = config.matrixMode === 'words' ? config.fontSize * 3 : config.fontSize;

            for (let i = 0; i < drops.length; i++) {
                let content;
                if (config.matrixMode === 'words') {
                    content = config.customWords[Math.floor(Math.random() * config.customWords.length)];
                } else {
                    const allChars = config.customWords.join('').split('');
                    content = allChars[Math.floor(Math.random() * allChars.length)];
                }
                
                if (Math.random() > 0.95) {
                    ctx.fillStyle = colors.bright;
                } else {
                    ctx.fillStyle = colors.primary;
                }
                
                ctx.fillText(content, i * charWidth, drops[i] * config.fontSize);

                if (drops[i] * config.fontSize > canvas.height || Math.random() > 0.975) {
                    drops[i] = 0;
                }

                drops[i] += config.speed / 10;
            }
        }

        function animate() {
            drawMatrix();
            
            setTimeout(() => {
                animationId = requestAnimationFrame(animate);
            }, 100 - config.density);
        }

        function updateWords() {
            const input = document.getElementById('custom-words').value;
            const words = input.split(',').map(word => word.trim()).filter(word => word.length > 0);
            
            config.customWords = words.length > 0 ? words : ['te', 'amo', 'amor'];
            
            if (config.matrixMode === 'characters') {
                config.customWords.push('#', '@', '!', '$', '%', '^', '&', '*', '(', ')', '-', '_', '=', '+', 'ツ', 'ジ', '0', '1', '2', '3', '4', '5',);
            }
            
            updateActiveWordsList();
            resizeCanvas();
        }

        function updatePhrases() {
            const input = document.getElementById('custom-phrases').value;
            const phrases = input.split('\n').map(phrase => phrase.trim()).filter(phrase => phrase.length > 0);
            
            config.customPhrases = phrases.length > 0 ? phrases : ['Te amo', 'Eres mi vida'];
            
            updateActivePhrasesList();
        }

        function updateActiveWordsList() {
            const activeWordsDiv = document.getElementById('active-words');
            const displayWords = config.customWords.slice(0, 20);
            activeWordsDiv.innerHTML = displayWords.map(word => 
                `<span style="background: rgba(0,255,0,0.1); padding: 2px 4px; margin: 1px; border-radius: 3px; display: inline-block;">${word}</span>`
            ).join(' ');
        }

        function updateActivePhrasesList() {
            const activePhrasesDiv = document.getElementById('active-phrases');
            activePhrasesDiv.innerHTML = config.customPhrases.map((phrase, index) => 
                `<div class="phrase-item">${index + 1}. ${phrase}</div>`
            ).join('');
        }

        function showSortedPhrases() {
            const messageDiv = document.getElementById('message');
            let index = 0;
            
            function displayNext() {
                if (index >= config.customPhrases.length) {
                    messageDiv.classList.remove('show');
                    return;
                }
                
                messageDiv.textContent = config.customPhrases[index];
                messageDiv.classList.add('show');
                
                phraseTimeout = setTimeout(() => {
                    messageDiv.classList.remove('show');
                    setTimeout(() => {
                        index++;
                        displayNext();
                    }, 1000);
                }, 4000);
            }
            
            clearTimeout(phraseTimeout);
            displayNext();
        }

        function showNextPhrase() {
            const messageDiv = document.getElementById('message');
            
            if (currentPhraseIndex >= config.customPhrases.length) {
                currentPhraseIndex = 0;
            }
            
            messageDiv.textContent = config.customPhrases[currentPhraseIndex];
            messageDiv.classList.add('show');
            
            currentPhraseIndex++;
        }

        function updateSpeed(value) {
            config.speed = parseInt(value);
            document.getElementById('speed-value').textContent = value;
        }

        function updateDensity(value) {
            config.density = parseInt(value);
            document.getElementById('density-value').textContent = value;
        }

        function updateFontSize(value) {
            config.fontSize = parseInt(value);
            document.getElementById('font-size-value').textContent = value + 'px';
            resizeCanvas();
        }

        function updateColorScheme(scheme) {
            config.colorScheme = scheme;
        }

        function togglePause() {
            isPaused = !isPaused;
            if (!isPaused) {
                animate();
            }
        }

        function resetMatrix() {
            cancelAnimationFrame(animationId);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            resizeCanvas();
            animate();
        }

        window.addEventListener('resize', resizeCanvas);
        
        document.addEventListener('click', function(event) {
            const controls = document.getElementById('controls');
            const toggleBtn = document.getElementById('toggle-settings');
            const nextBtn = document.getElementById('next-phrase');
            
            if (settingsVisible && !controls.contains(event.target) && !toggleBtn.contains(event.target)) {
                toggleSettings();
            }
        });

        resizeCanvas();
        updateWords();
        updatePhrases();
        animate();

        setTimeout(() => {
            showNextPhrase();
        }, 2000);
    </script>
</body>
</html>
